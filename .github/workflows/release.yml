name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install root dependencies
        run: npm ci

      - name: Install website dependencies
        run: npm ci --prefix website-v2

      - name: Validate
        run: npm run ci

      - name: Audit npm package contents
        run: npm run npm:check

      - name: Pack npm artifact
        run: npm pack

      - name: Archive website-v2 dist
        run: |
          cd website-v2
          zip -r ../website-v2-dist.zip dist

      - name: Check npm version
        id: npm-version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "kosmos-aos@${VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ steps.npm-version.outputs.exists == 'false' }}
        run: npm publish

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            kosmos-aos-*.tgz
            website-v2-dist.zip
