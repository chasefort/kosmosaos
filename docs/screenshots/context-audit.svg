<svg width="1400" height="880" viewBox="0 0 1400 880" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kosmos Context Audit</title>
  <desc id="desc">A dark dashboard showing broken links, unsupported outputs, stale generated files, and prompt hygiene findings.</desc>
  <rect width="1400" height="880" fill="#0A0A0A"/>
  <rect x="56" y="48" width="1288" height="784" rx="18" fill="#101014" stroke="rgba(255,255,255,.1)"/>
  <text x="100" y="112" fill="#FFFFFF" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="700">Context Audit</text>
  <text x="100" y="150" fill="#A3A3A3" font-family="Inter,Arial,sans-serif" font-size="15">Find the local knowledge gaps an AI agent should not trust yet.</text>
  <g font-family="Inter,Arial,sans-serif">
    <rect x="100" y="204" width="260" height="142" rx="12" fill="#141414" stroke="rgba(255,255,255,.1)"/>
    <text x="128" y="250" fill="#EF4444" font-size="42" font-weight="700">18</text>
    <text x="128" y="292" fill="#FFFFFF" font-size="17" font-weight="700">Broken links</text>
    <text x="128" y="322" fill="#A3A3A3" font-size="14">wikilinks and file refs</text>
    <rect x="392" y="204" width="260" height="142" rx="12" fill="#141414" stroke="rgba(255,255,255,.1)"/>
    <text x="420" y="250" fill="#F59E0B" font-size="42" font-weight="700">7</text>
    <text x="420" y="292" fill="#FFFFFF" font-size="17" font-weight="700">Unsupported outputs</text>
    <text x="420" y="322" fill="#A3A3A3" font-size="14">artifacts missing sources</text>
    <rect x="684" y="204" width="260" height="142" rx="12" fill="#141414" stroke="rgba(255,255,255,.1)"/>
    <text x="712" y="250" fill="#38BDF8" font-size="42" font-weight="700">42</text>
    <text x="712" y="292" fill="#FFFFFF" font-size="17" font-weight="700">Orphan nodes</text>
    <text x="712" y="322" fill="#A3A3A3" font-size="14">context with no consumers</text>
    <rect x="976" y="204" width="268" height="142" rx="12" fill="#141414" stroke="rgba(255,255,255,.1)"/>
    <text x="1004" y="250" fill="#A78BFA" font-size="42" font-weight="700">12</text>
    <text x="1004" y="292" fill="#FFFFFF" font-size="17" font-weight="700">Prompt findings</text>
    <text x="1004" y="322" fill="#A3A3A3" font-size="14">stale instructions and drift</text>
  </g>
  <rect x="100" y="386" width="724" height="366" rx="14" fill="#141414" stroke="rgba(255,255,255,.1)"/>
  <text x="130" y="430" fill="#FFFFFF" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700">Findings queue</text>
  <g font-family="Inter,Arial,sans-serif" font-size="15">
    <rect x="130" y="466" width="634" height="58" rx="8" fill="#1F1F1F"/>
    <text x="154" y="501" fill="#EF4444" font-weight="700">High</text><text x="220" y="501" fill="#FFFFFF">Release notes cite missing source doc</text>
    <rect x="130" y="540" width="634" height="58" rx="8" fill="#1F1F1F"/>
    <text x="154" y="575" fill="#F59E0B" font-weight="700">Med</text><text x="220" y="575" fill="#FFFFFF">Generated brief has no provenance edge</text>
    <rect x="130" y="614" width="634" height="58" rx="8" fill="#1F1F1F"/>
    <text x="154" y="649" fill="#38BDF8" font-weight="700">Info</text><text x="220" y="649" fill="#FFFFFF">Agent prompt references archived tool path</text>
  </g>
  <rect x="864" y="386" width="380" height="366" rx="14" fill="rgba(10,8,24,.84)" stroke="rgba(167,139,250,.25)"/>
  <text x="894" y="430" fill="#FFFFFF" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700">Evidence graph</text>
  <g stroke-width="2.5" opacity=".9">
    <path d="M960 544 L1062 492 L1150 560 L1084 646 L972 630 Z" stroke="#60A5FA"/>
    <path d="M1062 492 L1084 646" stroke="#A78BFA"/>
    <path d="M960 544 L1150 560" stroke="#38BDF8"/>
  </g>
  <g fill="#050712" stroke-width="3">
    <circle cx="960" cy="544" r="18" stroke="#22D3EE"/>
    <circle cx="1062" cy="492" r="18" stroke="#F472B6"/>
    <circle cx="1150" cy="560" r="18" stroke="#F59E0B"/>
    <circle cx="1084" cy="646" r="18" stroke="#EF4444"/>
    <circle cx="972" cy="630" r="18" stroke="#34D399"/>
  </g>
  <text x="894" y="706" fill="#A3A3A3" font-family="Inter,Arial,sans-serif" font-size="14">Every finding links back to files, notes, prompts, and run evidence.</text>
</svg>
